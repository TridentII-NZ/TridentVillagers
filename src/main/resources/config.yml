prefix: "[gradient:#68f589:#ac6fff:b][TridentVillagers][/gradient]&r"

messages:
  startup: "%prefix% &aenabled."
  shutdown: "%prefix% &fdisabled."
  reload-success: "%prefix% &aconfiguration reloaded."
  no-permission: "%prefix% &cYou do not have permission to do that."
  player-only: "%prefix% &cOnly players can use that command."
  unknown-command: "%prefix% &cUnknown command. Try /tridentvillagers reload."
  villager-leashed: "%prefix% &fVillager leashed."
  bribe-accepted: "%prefix% &aThe villager accepts your bribe."
  bribe-rejected: "%prefix% &cThat item is not an accepted bribe."
  villager-missing: "%prefix% &cThat villager is no longer available."
  bed-highlighted: "%prefix% &fVillager's bed is highlighted."
  bed-no-bed: "%prefix% &cThis villager has no assigned bed."

menus:
  trade-title: "%prefix% &7Villager"
  bribe-title: "%prefix% &7Bribe Villager"
  filler:
    material: RED_STAINED_GLASS_PANE
    name: " "
  trade-button:
    slot: 12
    material: EMERALD
    name: "[gradient:#00ff88:#aaff66]Open Trades[/gradient]"
    lore:
      - "&7View this villager's offers."
  bribe-button:
    slot: 16
    material: GOLD_INGOT
    name: "[gradient:#ffcc66:#ff6666]Offer Bribe[/gradient]"
    lore:
      - "&7Open the bribe menu."
  bribe-input-slot: 13
  bribe-confirm-button:
    slot: 16
    material: LIME_DYE
    name: "[gradient:#00ff88:#aaff66]Confirm Bribe[/gradient]"
    lore:
      - "&7Place a configured bribe in the center slot."
  bribe-back-button:
    slot: 10
    material: ARROW
    name: "&7Back"
    lore:
      - "&7Return to the villager menu."

features:
  always-restock: true
  villager-leads: true
  bribes: true
  bed-highlight: true
  always-willing: true

restock:
  interval-ticks: 1200
  reset-uses: true
  reset-demand: true

bribes:
  curing:
    cure-reputation-value: 20
    max-cures-per-player: 5
    price-discount-per-cure: 20
    max-price-discount: 100
  defaults:
    cure-count: 1
  accepted-items:
    emerald:
      material: EMERALD
      amount: 8
      cure-count: 1
    emerald-block:
      material: EMERALD_BLOCK
      amount: 1
      cure-count: 3
