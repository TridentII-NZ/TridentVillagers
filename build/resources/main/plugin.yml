name: TridentVillagers
version: '1.5-B'

main: TridentII.TridentVillagers
api-version: '1.21.11'
load: POSTWORLD
commands:
  tridentvillagers:
    description: Main TridentVillagers command.
    usage: /tridentvillagers reload
    aliases:
      - tvillagers
      - tv
permissions:
  tridentvillagers.command:
    description: Allows use of the base TridentVillagers command.
    default: op
  tridentvillagers.reload:
    description: Allows reloading the TridentVillagers configuration.
    default: op
